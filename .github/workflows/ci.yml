name: Checks

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Stage bundled extension
        run: npm run stage:bundled
      - name: Lint staged extension and sources
        run: npm run lint:staged
      - name: Typecheck
        run: npm run typecheck
      - name: Unit and integration tests with coverage
        run: npm run test:coverage
      - name: Short property fuzz
        env:
          FUZZ_TIME_MS: "10000"
        run: npm run test:fuzz
      - name: Verify store packaging
        run: |
          npm run package:runtime
          npm run build:source
      - name: Preserve store package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: store-package-${{ github.sha }}
          path: web-ext-artifacts/*.zip
          if-no-files-found: error
          compression-level: 0

  integration-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Windows integration tests
        run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - name: Install pinned dependencies
        run: npm ci
      - name: Chrome and Firefox e2e
        run: HEADLESS=1 npm run e2e
      - name: Preserve browser diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failure-${{ github.sha }}
          path: dist/e2e-artifacts
          if-no-files-found: warn
